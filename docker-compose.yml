services:
  db:
    image: postgres:15
    container_name: departahp-db
    environment:
      POSTGRES_DB: DSS
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    env_file:
      - .env
    build: .
    container_name: departahp-app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:123@db:5432/DSS
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-qwen/qwen3-next-80b-a3b-instruct:free}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
